services:
  frontend:
    build:
      context: ./cddm-app
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:8000}
        VITE_COMPANY_NAME: ${VITE_COMPANY_NAME:-CDDM}
    ports:
      - "3000:80"
    environment:
      NODE_ENV: production
    env_file:
      - path: .env
        required: false
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

