services:
  frontend:
    build:
      context: ./cddm-app
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-http://localhost:8000}
        VITE_COMPANY_NAME: ${VITE_COMPANY_NAME:-CDDM}
    ports:
      - "3000:80"
    environment:
      NODE_ENV: production
    env_file:
      - path: .env
        required: false
    restart: unless-stopped

  backend:
    build:
      context: ./cddm-api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DEBUG: "false"
    restart: unless-stopped

volumes:
  postgres_data:
